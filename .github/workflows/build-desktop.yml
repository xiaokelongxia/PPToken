name: Build desktop apps

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS
            runner: macos-latest
            bundle_args: app
            target_args: --target universal-apple-darwin
            artifact_name: PPToken-macOS
            artifact_paths: |
              src-tauri/target/universal-apple-darwin/release/bundle/macos/PPToken.app
              src-tauri/target/release/bundle/macos/PPToken.app
          - name: Windows
            runner: windows-latest
            bundle_args: nsis
            target_args: ""
            artifact_name: PPToken-Windows
            artifact_paths: |
              src-tauri/target/release/bundle/nsis/*.exe
              src-tauri/target/release/PPToken.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add macOS universal targets
        if: runner.os == 'macOS'
        run: rustup target add aarch64-apple-darwin x86_64-apple-darwin

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Windows bundler dependencies
        if: runner.os == 'Windows'
        run: choco install nsis -y --no-progress

      - name: Build ${{ matrix.name }} app
        run: pnpm tauri build ${{ matrix.target_args }} --bundles ${{ matrix.bundle_args }} --config src-tauri/tauri.updater.conf.json
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: Package macOS release asset
        if: runner.os == 'macOS'
        run: |
          APP_PATH="src-tauri/target/universal-apple-darwin/release/bundle/macos/PPToken.app"
          if [ ! -d "$APP_PATH" ]; then
            APP_PATH="src-tauri/target/release/bundle/macos/PPToken.app"
          fi
          ditto -c -k --sequesterRsrc --keepParent "$APP_PATH" "PPToken-macOS-universal.zip"

      - name: Package Windows release asset
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $installer = Get-ChildItem "src-tauri/target/release/bundle/nsis/*.exe" | Select-Object -First 1
          if ($installer) {
            Copy-Item $installer.FullName "PPToken-Windows-Setup.exe"
          } else {
            Copy-Item "src-tauri/target/release/PPToken.exe" "PPToken-Windows.exe"
          }

      - name: Prepare updater release assets
        if: startsWith(github.ref, 'refs/tags/v')
        run: node scripts/create-updater-manifest.mjs
        env:
          RELEASE_VERSION: ${{ github.ref_name }}

      - name: Upload ${{ matrix.name }} artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            ${{ matrix.artifact_paths }}
            PPToken-macOS-universal.zip
            PPToken-Windows-Setup.exe
            PPToken-Windows.exe
            release-assets/*
          if-no-files-found: error

      - name: Upload GitHub Release asset
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: PPToken ${{ github.ref_name }}
          files: |
            PPToken-macOS-universal.zip
            PPToken-Windows-Setup.exe
            PPToken-Windows.exe
            release-assets/PPToken_*.app.tar.gz
            release-assets/PPToken_*_x64-setup.exe
          fail_on_unmatched_files: false

  publish-update-manifest:
    name: Publish update manifest
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download release asset manifests
        uses: actions/download-artifact@v4
        with:
          pattern: PPToken-*
          path: downloaded-artifacts
          merge-multiple: true

      - name: Merge updater manifests
        run: |
          mkdir -p release-assets
          find downloaded-artifacts -name 'latest-*.json' -exec cp {} release-assets/ \;
          node scripts/merge-updater-manifests.mjs
        env:
          RELEASE_VERSION: ${{ github.ref_name }}

      - name: Upload update manifest
        uses: softprops/action-gh-release@v2
        with:
          name: PPToken ${{ github.ref_name }}
          files: release-assets/latest.json
          fail_on_unmatched_files: true
