name: Build desktop apps

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS
            runner: macos-latest
            bundle_args: app
            target_args: --target universal-apple-darwin
            artifact_name: PPToken-macOS
            artifact_paths: |
              src-tauri/target/universal-apple-darwin/release/bundle/macos/PPToken.app
              src-tauri/target/release/bundle/macos/PPToken.app
          - name: Windows
            runner: windows-latest
            bundle_args: nsis
            target_args: ""
            artifact_name: PPToken-Windows
            artifact_paths: |
              src-tauri/target/release/bundle/nsis/*.exe
              src-tauri/target/release/PPToken.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add macOS universal targets
        if: runner.os == 'macOS'
        run: rustup target add aarch64-apple-darwin x86_64-apple-darwin

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Windows bundler dependencies
        if: runner.os == 'Windows'
        run: choco install nsis -y --no-progress

      - name: Build ${{ matrix.name }} app
        run: pnpm tauri build ${{ matrix.target_args }} --bundles ${{ matrix.bundle_args }}

      - name: Upload ${{ matrix.name }} artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_paths }}
          if-no-files-found: error
